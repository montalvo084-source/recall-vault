<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Warm amber rounded background -->
  <rect width="512" height="512" rx="112" fill="#92400e"/>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#78350f"/>
    </linearGradient>
  </defs>

  <!-- Vault door body -->
  <rect x="108" y="148" width="296" height="232" rx="32" fill="white" opacity="0.12"/>
  <rect x="108" y="148" width="296" height="232" rx="32" fill="none" stroke="white" stroke-width="10" opacity="0.6"/>

  <!-- Vault dial — outer ring -->
  <circle cx="248" cy="264" r="82" fill="none" stroke="white" stroke-width="10" opacity="0.7"/>
  <!-- Vault dial — inner -->
  <circle cx="248" cy="264" r="52" fill="white" opacity="0.15"/>
  <circle cx="248" cy="264" r="52" fill="none" stroke="white" stroke-width="8" opacity="0.8"/>
  <!-- Center nub -->
  <circle cx="248" cy="264" r="16" fill="white" opacity="0.9"/>

  <!-- Dial tick marks -->
  <line x1="248" y1="174" x2="248" y2="188" stroke="white" stroke-width="7" stroke-linecap="round" opacity="0.8"/>
  <line x1="248" y1="340" x2="248" y2="354" stroke="white" stroke-width="7" stroke-linecap="round" opacity="0.8"/>
  <line x1="162" y1="264" x2="176" y2="264" stroke="white" stroke-width="7" stroke-linecap="round" opacity="0.8"/>
  <line x1="320" y1="264" x2="334" y2="264" stroke="white" stroke-width="7" stroke-linecap="round" opacity="0.8"/>

  <!-- Handle bar -->
  <rect x="358" y="220" width="22" height="88" rx="11" fill="white" opacity="0.75"/>

  <!-- Hinge dots -->
  <circle cx="140" cy="192" r="9" fill="white" opacity="0.5"/>
  <circle cx="140" cy="340" r="9" fill="white" opacity="0.5"/>
</svg>
